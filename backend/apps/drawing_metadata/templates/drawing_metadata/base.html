<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Drawing Metadata</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; color: #222; background: #f7f8fa; }
      h1 { margin: 0; padding: 18px 24px; background: #fff; border-bottom: 1px solid #ddd; font-size: 22px; }
      table { border-collapse: collapse; width: 100%; margin-bottom: 24px; }
      th, td { border: 1px solid #ccc; padding: 8px; text-align: left; vertical-align: top; }
      th { background: #f5f5f5; }
      .table-scroll { overflow-x: auto; margin-bottom: 24px; }
      .table-scroll table { margin-bottom: 0; }
      .payload-table { min-width: 1080px; table-layout: fixed; }
      .payload-table th, .payload-table td { overflow-wrap: anywhere; word-break: break-word; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 24px; }
      .panel { border: 1px solid #ddd; padding: 16px; border-radius: 6px; background: #fff; }
      .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
      .app-shell { display: grid; grid-template-columns: 240px minmax(0, 1fr); min-height: calc(100vh - 62px); }
      .side-nav { background: #fff; border-right: 1px solid #ddd; padding: 16px; display: grid; align-content: start; gap: 18px; }
      .side-nav-section { display: grid; gap: 6px; }
      .side-nav-title { color: #666; font-size: 12px; font-weight: 700; }
      .side-nav a { display: block; padding: 8px 10px; border-radius: 4px; color: #222; }
      .side-nav a:hover { background: #eef3fb; color: #0a58ca; }
      .main-content { padding: 24px; min-width: 0; }
      textarea { width: 100%; min-height: 220px; font-family: Consolas, monospace; }
      pre { white-space: pre-wrap; word-break: break-word; background: #f8f8f8; border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
      .status-pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #ececec; }
      .messages { list-style: none; padding: 0; }
      .messages li { margin-bottom: 8px; padding: 10px 12px; background: #eef7ff; border: 1px solid #cfe5ff; border-radius: 6px; }
      a { color: #0a58ca; text-decoration: none; }
      button { padding: 8px 14px; }
      input[type="text"] { width: 100%; padding: 8px; }
      .muted { color: #666; }
      .compact-list { margin: 8px 0 0; padding-left: 20px; }
      .viewer-embed-shell { display: grid; grid-template-columns: minmax(360px, 1fr) minmax(320px, 420px); gap: 16px; margin-bottom: 24px; align-items: stretch; }
      .viewer-stage-preview, .viewer-tag-panel { border: 1px solid #d7dde6; border-radius: 8px; background: #fff; }
      .viewer-stage-preview { min-height: 520px; display: grid; grid-template-rows: auto 1fr; overflow: hidden; }
      .viewer-toolbar { display: flex; gap: 8px; padding: 10px 12px; border-bottom: 1px solid #e3e7ee; background: #f8fafc; }
      .viewer-tool-button, .mode-badge, .tag-chip { display: inline-flex; align-items: center; min-height: 24px; padding: 0 8px; border: 1px solid #d8dee8; border-radius: 999px; background: #fff; font-size: 12px; }
      .viewer-canvas-preview { display: grid; place-items: center; background: #eef3f8; }
      .viewer-paper-preview { width: min(72%, 620px); aspect-ratio: 1.414 / 1; border: 1px solid #9aa7b8; background: #fff; position: relative; box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12); }
      .viewer-title-block-preview { position: absolute; right: 18px; bottom: 18px; width: 42%; min-height: 54px; border: 1px solid #9aa7b8; padding: 8px; display: grid; gap: 4px; }
      .viewer-tag-panel { padding: 16px; display: grid; gap: 14px; align-content: start; }
      .viewer-panel-heading { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
      .section-eyebrow { margin: 0 0 4px; color: #0a58ca; font-size: 12px; font-weight: 700; }
      .mode-badge-row, .tag-chip-wrap, .target-row-chips { display: flex; gap: 6px; flex-wrap: wrap; }
      .mode-badge.available { background: #eaf6ef; border-color: #b7e0c5; color: #146c43; }
      .viewer-meta-list, .target-attribute-list { display: grid; gap: 8px; margin: 0; }
      .viewer-meta-list div, .target-attribute-list div { display: grid; grid-template-columns: 92px minmax(0, 1fr); gap: 8px; }
      .viewer-meta-list dt, .target-attribute-list dt { color: #666; }
      .viewer-meta-list dd, .target-attribute-list dd { margin: 0; overflow-wrap: anywhere; }
      .tag-chip { background: #eef6ff; border-color: #cfe5ff; color: #0a58ca; }
      .tag-chip.subdued { background: #f8f8f8; color: #666; }
      .tag-chip.compact { font-size: 11px; min-height: 22px; }
      .viewer-quality-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .viewer-quality-row div { border: 1px solid #e3e7ee; border-radius: 8px; padding: 8px; display: grid; gap: 2px; }
      .viewer-quality-row strong { font-size: 18px; }
      .viewer-quality-row span { color: #666; font-size: 12px; }
      .target-stack { display: grid; gap: 10px; }
      .target-row { border: 1px solid #e3e7ee; border-radius: 8px; padding: 10px; display: grid; gap: 8px; }
      .target-row-header { display: flex; justify-content: space-between; gap: 8px; }
      .target-row-header span { color: #666; font-size: 12px; }
      .settings-route-list { display: grid; border-top: 1px solid #ddd; }
      .settings-route-link { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 4px; border-bottom: 1px solid #ddd; color: #222; }
      .settings-route-link > span:first-child { display: grid; gap: 4px; }
      .settings-route-link:hover strong { color: #0a58ca; }
      @media (max-width: 980px) {
        .app-shell { grid-template-columns: 1fr; }
        .side-nav { border-right: 0; border-bottom: 1px solid #ddd; }
        .viewer-embed-shell { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <h1><a href="/drawing-metadata/">Drawing Metadata</a></h1>
    <div class="app-shell">
      <aside class="side-nav">
        <div class="side-nav-section">
          <div class="side-nav-title">メイン</div>
          {% if drawing %}
            <a href="/drawing-metadata/{{ drawing.id }}/">図面管理</a>
            <a href="/drawing-metadata/{{ drawing.id }}/product-unit/">製品・装置・ユニット</a>
            <a href="/drawing-metadata/{{ drawing.id }}/parts/">部品</a>
          {% else %}
            <a href="/drawing-metadata/">図面管理</a>
          {% endif %}
        </div>
        {% if drawing %}
          <div class="side-nav-section">
            <div class="side-nav-title">確認</div>
            <a href="/drawing-metadata/{{ drawing.id }}/tags/">タグ候補レビュー</a>
          </div>
        {% endif %}
        <div class="side-nav-section">
          <div class="side-nav-title">管理</div>
          <a href="/drawing-metadata/system/tag-automation/">システム設定</a>
        </div>
      </aside>
      <main class="main-content">
        {% if messages %}
          <ul class="messages">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
